# Cloudflare Worker — wiserdoc.com (site + API)
#
# Workers Builds settings:
#   Build command:  npm ci && npm run build:pages
#   Deploy command: npx wrangler deploy          ← NOT "wrangler versions upload"
#
# After deploy, bind AISTETH_KV and set VITE_GOOGLE_CLIENT_ID + JWT_SECRET on this Worker.
# Attach custom domain wiserdoc.com here and remove it from the Pages project.
name = "wiserdoc"
main = "worker.js"
compatibility_date = "2024-05-24"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build:pages"

[assets]
directory = "frontend/dist"
binding = "ASSETS"
